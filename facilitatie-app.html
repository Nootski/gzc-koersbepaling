<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koersbepaling Maatschap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --bg-card: #FFFFFF;
  --primary: #1B4D4F;
  --primary-light: #E8F0F0;
  --accent: #C1694F;
  --accent-light: #FCEEE8;
  --text: #1E1E1E;
  --text-secondary: #5F6368;
  --border: #E2DFD8;
  --green: #2D7D46;
  --green-light: #E8F5EC;
  --red: #B83D3D;
  --red-light: #FDE8E8;
  --yellow: #B88D2D;
  --yellow-light: #FFF8E1;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* JOIN MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(27,77,79,0.85);
  z-index: 10000; display: flex; align-items: center; justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: white; border-radius: 20px; padding: 48px; text-align: center;
  max-width: 440px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
}
.modal-box h1 { font-family: 'Fraunces', serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
.modal-box p { color: var(--text-secondary); margin-bottom: 28px; font-size: 0.92rem; }
.name-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.name-btn {
  padding: 14px; border-radius: 12px; border: 2px solid var(--border);
  background: white; font-family: 'Inter', sans-serif; font-size: 0.95rem;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 10px; justify-content: center;
}
.name-btn:hover { border-color: var(--primary); background: var(--primary-light); }
.name-btn .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

/* TOP BAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: var(--primary); color: white; flex-shrink: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 500; }
.topbar-section { font-size: 0.8rem; opacity: 0.7; }
.topbar-participants {
  display: flex; gap: 4px; align-items: center;
}
.participant-dot {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 700; color: white; transition: all 0.3s;
}
.participant-dot.online { border-color: white; }
.participant-dot.offline { opacity: 0.35; }
.topbar-timer { display: flex; align-items: center; gap: 8px; }
.timer-display {
  font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700;
  min-width: 90px; text-align: center; line-height: 1;
}
.timer-display.warning { color: #FFB74D; }
.timer-display.danger { animation: pulse 1s ease-in-out infinite; color: #FF7043; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.timer-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  color: white; padding: 5px 10px; border-radius: 6px; font-size: 0.7rem;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.timer-btn:hover { background: rgba(255,255,255,0.25); }
.timer-btn.active { background: var(--accent); border-color: var(--accent); }

/* PROGRESS BAR */
.progress-bar { height: 3px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #81C784, #FFB74D, #FF7043); transition: width 0.3s; }

/* MAIN */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 230px; background: var(--bg-card); border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0; padding: 12px 0;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 16px; cursor: pointer;
  transition: all 0.2s; font-size: 0.78rem; color: var(--text-secondary);
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--primary-light); color: var(--primary); }
.sidebar-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
.sidebar-icon {
  width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 0.8rem; flex-shrink: 0; background: var(--bg);
}
.sidebar-item.active .sidebar-icon { background: var(--primary); color: white; }
.sidebar-time { margin-left: auto; font-size: 0.65rem; opacity: 0.5; white-space: nowrap; }

/* CONTENT */
.content {
  flex: 1; overflow-y: auto; padding: 32px 48px; scroll-behavior: smooth;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.section-badge {
  display: inline-block; font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--accent); background: var(--accent-light);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.section-title {
  font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700;
  color: var(--primary); line-height: 1.2; margin-bottom: 6px;
}
.section-subtitle {
  font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6;
  margin-bottom: 28px; max-width: 620px;
}

/* CARDS */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 600;
  color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

/* SPOOR TOGGLE */
.spoor-toggle {
  display: flex; border-radius: 8px; overflow: hidden; border: 2px solid var(--primary); width: fit-content; margin-bottom: 20px;
}
.spoor-btn {
  padding: 8px 20px; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  font-size: 0.8rem; font-weight: 600; background: white; color: var(--primary); transition: all 0.2s;
}
.spoor-btn.active { background: var(--primary); color: white; }
.spoor-content { display: none; }
.spoor-content.active { display: block; }

/* STELLING */
.stelling {
  background: var(--bg); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px; font-size: 0.88rem; line-height: 1.5;
}
.stelling-text { flex: 1; }
.vote-btns { display: flex; gap: 3px; flex-shrink: 0; }
.vote-btn {
  width: 40px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
  background: white; cursor: pointer; font-size: 0.85rem; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.15s; gap: 1px; line-height: 1;
}
.vote-btn:hover { transform: scale(1.1); }
.vote-btn .vote-count { font-size: 0.55rem; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-radius: 3px; padding: 0 2px; }
.vote-btn .vote-count:hover { background: var(--red-light); color: var(--red); }
.vote-btn.flash-up { background: var(--green-light); border-color: var(--green); }
.vote-btn.flash-down { background: var(--red-light); border-color: var(--red); }
.vote-btn.flash-side { background: var(--yellow-light); border-color: var(--yellow); }

/* STEPS */
.steps { list-style: none; counter-reset: step; }
.steps li {
  counter-increment: step; padding: 8px 0 8px 40px; position: relative;
  font-size: 0.88rem; line-height: 1.6; border-left: 2px solid var(--border); margin-left: 12px;
}
.steps li:last-child { border-left-color: transparent; }
.steps li::before {
  content: counter(step); position: absolute; left: -1px; top: 6px;
  transform: translateX(-50%); width: 24px; height: 24px; background: var(--primary);
  color: white; border-radius: 50%; font-size: 0.7rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* PRINCIPLE BOX */
.principle-box {
  background: var(--primary-light); border: 2px dashed var(--primary);
  border-radius: var(--radius); padding: 16px 20px; margin-top: 14px;
}
.principle-box label {
  display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--primary); margin-bottom: 6px;
}
.principle-input {
  width: 100%; border: none; background: transparent; font-family: 'Fraunces', serif;
  font-size: 1rem; color: var(--primary); outline: none; resize: vertical; min-height: 50px; line-height: 1.5;
}
.principle-input::placeholder { color: rgba(27,77,79,0.3); }

/* SMART TABLE */
.smart-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.smart-table th {
  background: var(--primary); color: white; padding: 8px 12px; text-align: left;
  font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
}
.smart-table th:first-child { border-radius: 8px 0 0 0; }
.smart-table th:last-child { border-radius: 0 8px 0 0; }
.smart-table td { padding: 6px 12px; border-bottom: 1px solid var(--border); }
.smart-table td input {
  width: 100%; border: none; background: transparent; font-family: 'Inter', sans-serif;
  font-size: 0.82rem; padding: 3px 0; outline: none;
}
.smart-table td input:focus { background: var(--primary-light); border-radius: 4px; padding: 3px 5px; margin: -3px -5px; }
.smart-table tr:nth-child(even) td { background: var(--bg); }

/* NAVIGATION */
.nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: var(--bg-card); border-top: 1px solid var(--border); flex-shrink: 0;
}
.nav-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 20px; border-radius: 8px;
  border: 2px solid var(--primary); background: white; color: var(--primary);
  font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.nav-btn:hover { background: var(--primary-light); }
.nav-btn.primary { background: var(--primary); color: white; }
.nav-btn.primary:hover { background: #164042; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-dots { display: flex; gap: 5px; }
.nav-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--border); cursor: pointer; transition: all 0.2s;
}
.nav-dot.active { background: var(--primary); transform: scale(1.3); }

/* STICKY NOTES */
.sticky-zone {
  display: flex; flex-wrap: wrap; gap: 10px; padding: 14px;
  background: var(--bg); border-radius: var(--radius); min-height: 100px; margin-top: 10px;
}
.sticky-note {
  width: 150px; min-height: 100px; padding: 10px; border-radius: 3px;
  font-size: 0.75rem; line-height: 1.4; box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
  position: relative; display: flex; flex-direction: column;
}
.sticky-note .sticky-author {
  font-size: 0.6rem; font-weight: 700; margin-bottom: 4px; opacity: 0.7;
}
.sticky-note textarea {
  width: 100%; flex: 1; min-height: 60px; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 0.75rem; resize: none; outline: none; line-height: 1.4;
}
.sticky-note .sticky-delete {
  position: absolute; top: 2px; right: 4px; background: none; border: none;
  font-size: 0.7rem; cursor: pointer; opacity: 0.3; color: inherit;
}
.sticky-note .sticky-delete:hover { opacity: 0.8; }
.sticky-add {
  width: 150px; min-height: 100px; border: 2px dashed var(--border); border-radius: 3px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 1.5rem; color: var(--border); transition: all 0.2s;
}
.sticky-add:hover { border-color: var(--primary); color: var(--primary); }

/* FLOW STEPS */
.flow-step {
  position: relative; padding-left: 40px; margin-bottom: 0;
}
.flow-step::before {
  content: attr(data-step); position: absolute; left: 0; top: 0;
  width: 30px; height: 30px; border-radius: 50%; background: var(--primary);
  color: white; font-size: 0.75rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.flow-step.step-done::before { background: var(--green); content: '✓'; }
.flow-connector {
  width: 2px; height: 24px; background: var(--border); margin-left: 14px;
}
.flow-connector.active { background: var(--primary); }
.tension-card {
  background: var(--accent-light); border: 1px solid #E8C4B5; border-radius: var(--radius);
  padding: 16px 20px; margin-bottom: 10px;
}
.tension-card .tension-label {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--accent); margin-bottom: 6px;
}
.principle-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.principle-card {
  border-radius: var(--radius); padding: 20px; border: 2px dashed;
}
.principle-card.org { background: var(--primary-light); border-color: var(--primary); }
.principle-card.fin { background: var(--yellow-light); border-color: var(--yellow); }
.principle-card.mw-wg { background: var(--accent-light); border-color: var(--accent); }
.principle-card.mw-on { background: var(--green-light); border-color: var(--green); }
.principle-card.kb-int { background: var(--primary-light); border-color: var(--primary); }
.principle-card.kb-ext { background: var(--accent-light); border-color: var(--accent); }
.principle-card label {
  display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 6px;
}
.principle-card.org label { color: var(--primary); }
.principle-card.fin label { color: var(--yellow); }
.principle-card.mw-wg label { color: var(--accent); }
.principle-card.mw-on label { color: var(--green); }
.principle-card.kb-int label { color: var(--primary); }
.principle-card.kb-ext label { color: var(--accent); }
.principle-card textarea {
  width: 100%; border: none; background: transparent; font-family: 'Fraunces', serif;
  font-size: 1rem; outline: none; resize: vertical; min-height: 50px; line-height: 1.5;
}
.principle-card.org textarea { color: var(--primary); }
.principle-card.fin textarea { color: #7A6520; }
.principle-card.mw-wg textarea { color: var(--accent); }
.principle-card.mw-on textarea { color: var(--green); }
.principle-card.kb-int textarea { color: var(--primary); }
.principle-card.kb-ext textarea { color: var(--accent); }
.mini-smart { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
.mini-smart th {
  background: var(--accent); color: white; padding: 7px 10px; text-align: left;
  font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em;
}
.mini-smart th:first-child { border-radius: 6px 0 0 0; }
.mini-smart th:last-child { border-radius: 0 6px 0 0; }
.mini-smart td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
.mini-smart td input {
  width: 100%; border: none; background: transparent; font-family: 'Inter', sans-serif;
  font-size: 0.8rem; padding: 2px 0; outline: none;
}
.mini-smart td input:focus { background: var(--accent-light); border-radius: 3px; padding: 2px 4px; }
.vote-hint {
  display: inline-block; font-size: 0.68rem; color: var(--text-secondary); background: var(--bg);
  padding: 3px 8px; border-radius: 6px; margin-bottom: 10px;
}

/* PAUZE */
.pauze-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh; text-align: center;
}
.pauze-icon { font-size: 3.5rem; margin-bottom: 20px; }
.pauze-title { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
.pauze-sub { font-size: 1.1rem; color: var(--text-secondary); }

/* CHECKIN GRID */
.checkin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 14px; }
.checkin-q { background: var(--bg); border-radius: 10px; padding: 16px; }
.checkin-q .q-num { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.checkin-q .q-text { font-size: 0.85rem; line-height: 1.5; color: var(--text-secondary); }

/* REMINDER */
.reminder {
  display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px;
  background: var(--yellow-light); border-radius: 10px; border-left: 4px solid var(--yellow);
  font-size: 0.82rem; line-height: 1.5; margin-bottom: 16px;
}
.reminder-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

/* OUTCOME BOX */
.outcome-box {
  background: var(--green-light); border-radius: 10px; padding: 14px 16px; margin-top: 16px;
  display: flex; align-items: flex-start; gap: 8px;
}
.outcome-box .outcome-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
.outcome-box .outcome-text { font-size: 0.84rem; line-height: 1.5; color: var(--green); font-weight: 500; }

/* BEEP OVERLAY */
.beep-overlay {
  display: none; position: fixed; inset: 0; background: rgba(193,105,79,0.92);
  z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
  color: white; cursor: pointer;
}
.beep-overlay.show { display: flex; }
.beep-overlay .beep-text { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
.beep-overlay .beep-sub { font-size: 1rem; opacity: 0.8; }

/* LIVE INDICATOR */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; display: inline-block;
  margin-right: 6px; animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* RESPONSIVE — TABLET (iPad) */
@media (max-width: 1024px) {
  .sidebar { width: 180px; }
  .sidebar-item { font-size: 0.72rem; padding: 8px 12px; }
  .sidebar-time { display: none; }
  .content { padding: 24px 28px; }
}

@media (max-width: 900px) {
  .sidebar { display: none; }
  .content { padding: 20px; }
  .section-title { font-size: 1.6rem; }
  .timer-display { font-size: 1.4rem; }
}

/* RESPONSIVE — SMALL TABLET / LARGE PHONE */
@media (max-width: 768px) {
  .content [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  .topbar { padding: 8px 14px; flex-wrap: wrap; gap: 6px; }
  .topbar-left { min-width: 0; }
  .topbar-title { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .topbar-section { font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .topbar-timer { gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .timer-btn { padding: 4px 8px; font-size: 0.65rem; }
  .timer-display { font-size: 1.2rem; min-width: 70px; }

  .content { padding: 16px; }
  .section-title { font-size: 1.4rem; margin-bottom: 4px; }
  .section-subtitle { font-size: 0.85rem; margin-bottom: 18px; }

  .card { padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 0.95rem; margin-bottom: 10px; }

  .stelling { padding: 10px 12px; gap: 10px; font-size: 0.82rem; flex-wrap: wrap; }
  .vote-btns { width: 100%; justify-content: flex-start; gap: 6px; }
  .vote-btn { width: 52px; height: 32px; flex-direction: row; gap: 4px; }

  .principle-split { grid-template-columns: 1fr; }
  .principle-card { padding: 14px; }

  .sticky-note { width: 130px; min-height: 85px; }
  .sticky-add { width: 130px; min-height: 85px; }
  .sticky-zone { padding: 10px; gap: 8px; }

  .smart-table { font-size: 0.72rem; }
  .smart-table th { padding: 6px 8px; font-size: 0.62rem; }
  .smart-table td { padding: 4px 8px; }
  .smart-table td input { font-size: 0.72rem; }

  .mini-smart { font-size: 0.7rem; }
  .mini-smart th { padding: 5px 6px; font-size: 0.6rem; }
  .mini-smart td { padding: 4px 6px; }
  .mini-smart td input { font-size: 0.7rem; }

  .nav-bar { padding: 10px 14px; }
  .nav-btn { padding: 7px 14px; font-size: 0.75rem; }
  .nav-dots { gap: 4px; }
  .nav-dot { width: 6px; height: 6px; }

  .checkin-grid { grid-template-columns: 1fr 1fr; gap: 10px; }

  .reminder { padding: 10px 12px; font-size: 0.78rem; }

  .flow-step { padding-left: 34px; }
  .flow-step::before { width: 26px; height: 26px; font-size: 0.7rem; }
  .flow-connector { margin-left: 12px; }

  .pauze-title { font-size: 1.8rem; }
  .pauze-icon { font-size: 2.5rem; }
}

/* RESPONSIVE — PHONE */
@media (max-width: 480px) {
  body { height: 100dvh; }
  .content [style*="padding-left:40px"] { padding-left: 10px !important; }

// ===== STATE (localStorage) =====
let currentSection = 0;
let timerSeconds = 0;
let timerRunning = false;
let timerInterval = null;
let timerOriginal = 0;
let focusedInput = null;

let state = (() => {
  try {
    const s = localStorage.getItem('heidedag-state');
    return s ? JSON.parse(s) : { votes: {}, stickies: {}, texts: {}, version: 0 };
  } catch(e) { return { votes: {}, stickies: {}, texts: {}, version: 0 }; }
})();

let serverAvailable = false;

function save() {
  localStorage.setItem('heidedag-state', JSON.stringify(state));
}

function serverPush(update) {
  fetch('/api/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(update)
  }).then(r => { if (r.ok) serverAvailable = true; })
    .catch(() => { serverAvailable = false; });
}

async function initFromServer() {
  try {
    const r = await fetch('/api/state');
    if (!r.ok) return;
    const remote = await r.json();
    serverAvailable = true;
    if (Object.keys(remote.votes || {}).length || Object.keys(remote.stickies || {}).length || Object.keys(remote.texts || {}).length) {
      state = remote;
      save();
    }
  } catch(e) {
    serverAvailable = false;
  }
}

// ===== HELPERS =====
function stickyZone(zoneId, defaultColor) {
  return `<div class="sticky-zone" id="zone-${zoneId}" data-zone="${zoneId}" data-color="${STICKY_COLORS[defaultColor] || STICKY_COLORS.yellow}">
    <div class="sticky-add" onclick="addSticky('${zoneId}')">+</div>
  </div>`;
}

function stelling(id, text) {
  return `<div class="stelling" id="stelling-${id}">
    <div class="stelling-text">${text}</div>
    <div class="vote-btns">
      <button class="vote-btn" onclick="vote('${id}','up',this)">👍<span class="vote-count" id="vc-${id}-up" onclick="event.stopPropagation();unvote('${id}','up',this.closest('.vote-btn'))">0</span></button>
      <button class="vote-btn" onclick="vote('${id}','side',this)">🤷<span class="vote-count" id="vc-${id}-side" onclick="event.stopPropagation();unvote('${id}','side',this.closest('.vote-btn'))">0</span></button>
      <button class="vote-btn" onclick="vote('${id}','down',this)">👎<span class="vote-count" id="vc-${id}-down" onclick="event.stopPropagation();unvote('${id}','down',this.closest('.vote-btn'))">0</span></button>
    </div>
  </div>`;
}

function spoorToggle(id, kort, uitgebreid) {
  return `<div class="card">
    <div class="spoor-toggle">
      <button class="spoor-btn active" onclick="switchSpoor('${id}','kort',this)">⚡ Kort</button>
      <button class="spoor-btn" onclick="switchSpoor('${id}','uitgebreid',this)">◎ Uitgebreid</button>
    </div>
    <div class="spoor-content active" id="spoor-${id}-kort">${kort}</div>
    <div class="spoor-content" id="spoor-${id}-uitgebreid">${uitgebreid}</div>
  </div>`;
}

function principleBox(id, placeholder) {
  return `<div class="principle-box">
    <label>Streefuitkomst</label>
    <textarea class="principle-input" data-sync="principle-${id}" placeholder="${placeholder}" oninput="onTextInput(this)" onfocus="focusedInput=this.dataset.sync" onblur="focusedInput=null;flushText(this)"></textarea>
  </div>`;
}

function outcomeBox(text) {
  return `<div class="outcome-box"><span class="outcome-icon">🎯</span><div class="outcome-text">${text}</div></div>`;
}

// ===== INIT =====
function init() {
  renderSidebar();
  renderNavDots();
  renderSection(0);
}

function renderSidebar() {
  document.getElementById('sidebar').innerHTML = sections.map((s, i) =>
    `<div class="sidebar-item ${i === currentSection ? 'active' : ''}" onclick="goToSection(${i})">
      <div class="sidebar-icon">${s.icon}</div><div>${s.title}</div>
      <div class="sidebar-time">${s.time}</div>
    </div>`
  ).join('');
}

function renderNavDots() {
  document.getElementById('navDots').innerHTML = sections.map((_, i) =>
    `<div class="nav-dot ${i === currentSection ? 'active' : ''}" onclick="goToSection(${i})"></div>`
  ).join('');
}

function renderSection(idx) {
  currentSection = idx;
  const s = sections[idx];
  document.getElementById('content').innerHTML = s.render();
  document.getElementById('content').scrollTop = 0;
  document.getElementById('topbarSection').textContent = `${s.icon} ${s.title} — ${s.time}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === sections.length - 1;
  document.getElementById('nextBtn').textContent = idx === sections.length - 1 ? 'Klaar ✓' : 'Volgende →';
  document.getElementById('progressFill').style.width = `${(idx / (sections.length - 1)) * 100}%`;
  if (s.minutes) setTimer(s.minutes);
  renderSidebar();
  renderNavDots();
  attachSyncListeners();
  restoreUI();
}

function navigate(dir) {
  const next = currentSection + dir;
  if (next >= 0 && next < sections.length) renderSection(next);
}
function goToSection(idx) { renderSection(idx); }

// ===== RESTORE UI (from state) =====
function restoreUI() {
  for (const [id, counts] of Object.entries(state.votes || {})) {
    ['up', 'side', 'down'].forEach(d => {
      const el = document.getElementById(`vc-${id}-${d}`);
      if (el) el.textContent = counts[d] || 0;
    });
  }
  for (const [zoneId, stickies] of Object.entries(state.stickies || {})) {
    const zone = document.getElementById(`zone-${zoneId}`);
    if (!zone) continue;
    const addBtn = zone.querySelector('.sticky-add');
    for (const [stickyId, data] of Object.entries(stickies)) {
      if (!zone.querySelector(`[data-sticky-id="${stickyId}"]`)) {
        const note = createStickyElement(zoneId, stickyId, data);
        zone.insertBefore(note, addBtn);
      }
    }
  }
  for (const [id, value] of Object.entries(state.texts || {})) {
    const el = document.querySelector(`[data-sync="${id}"]`);
    if (el && el.value !== value) el.value = value;
  }
}

// ===== USER ACTIONS =====
function vote(id, direction, btn) {
  if (!state.votes[id]) state.votes[id] = { up: 0, side: 0, down: 0 };
  state.votes[id][direction]++;
  save();
  serverPush({ type: 'vote', id, direction });
  const el = document.getElementById(`vc-${id}-${direction}`);
  if (el) el.textContent = state.votes[id][direction];
  btn.classList.add('flash-' + direction);
  setTimeout(() => btn.classList.remove('flash-' + direction), 300);
}

function unvote(id, direction, btn) {
  if (!state.votes[id]) return false;
  if ((state.votes[id][direction] || 0) <= 0) return false;
  state.votes[id][direction]--;
  save();
  serverPush({ type: 'unvote', id, direction });
  const el = document.getElementById(`vc-${id}-${direction}`);
  if (el) el.textContent = state.votes[id][direction];
  btn.style.background = '#fce4ec';
  setTimeout(() => btn.style.background = '', 300);
  return false;
}

function addSticky(zoneId) {
  const zone = document.getElementById(`zone-${zoneId}`);
  const color = zone.dataset.color;
  const stickyId = `s-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
  if (!state.stickies[zoneId]) state.stickies[zoneId] = {};
  state.stickies[zoneId][stickyId] = { text: '', color };
  save();
  serverPush({ type: 'sticky_add', zone: zoneId, id: stickyId, text: '', color, author: '', authorColor: color });
  const note = createStickyElement(zoneId, stickyId, { text: '', color });
  const addBtn = zone.querySelector('.sticky-add');
  zone.insertBefore(note, addBtn);
  note.querySelector('textarea').focus();
}

function deleteSticky(zoneId, stickyId) {
  if (state.stickies[zoneId]) delete state.stickies[zoneId][stickyId];
  save();
  serverPush({ type: 'sticky_delete', zone: zoneId, id: stickyId });
  const el = document.querySelector(`[data-sticky-id="${stickyId}"]`);
  if (el) el.remove();
}

function onStickyEdit(zoneId, stickyId, text) {
  if (state.stickies[zoneId] && state.stickies[zoneId][stickyId]) {
    state.stickies[zoneId][stickyId].text = text;
    save();
    serverPush({ type: 'sticky_update', zone: zoneId, id: stickyId, text });
  }
}

function createStickyElement(zoneId, stickyId, data) {
  const note = document.createElement('div');
  note.className = 'sticky-note';
  note.dataset.stickyId = stickyId;
  note.style.background = data.color;
  note.innerHTML = `
    <button class="sticky-delete" onclick="deleteSticky('${zoneId}','${stickyId}')" title="Verwijder">✕</button>
    <textarea placeholder="Type hier..."
      oninput="onStickyEdit('${zoneId}','${stickyId}',this.value)"
    >${data.text}</textarea>`;
  return note;
}

let textDebounceTimers = {};
function onTextInput(el) {
  const id = el.dataset.sync;
  state.texts[id] = el.value;
  save();
  clearTimeout(textDebounceTimers[id]);
  textDebounceTimers[id] = setTimeout(() => {
    serverPush({ type: 'text', id, value: el.value });
  }, 500);
}

function flushText(el) {
  const id = el.dataset.sync;
  state.texts[id] = el.value;
  save();
  clearTimeout(textDebounceTimers[id]);
  serverPush({ type: 'text', id, value: el.value });
}

function attachSyncListeners() {
  document.querySelectorAll('[data-sync]').forEach(el => {
    if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
      el.addEventListener('input', () => onTextInput(el));
    }
  });
}

// ===== SPOOR TOGGLE =====
function switchSpoor(id, spoor, btn) {
  document.getElementById(`spoor-${id}-kort`).classList.toggle('active', spoor === 'kort');
  document.getElementById(`spoor-${id}-uitgebreid`).classList.toggle('active', spoor === 'uitgebreid');
  btn.parentElement.querySelectorAll('.spoor-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  setTimer(spoor === 'kort' ? 15 : 30);
}

// ===== TIMER =====
function setTimer(min) {
  timerSeconds = min * 60; timerOriginal = timerSeconds;
  timerRunning = false; clearInterval(timerInterval);
  updateTimerDisplay();
  document.getElementById('timerToggle').textContent = 'Start';
  document.getElementById('timerToggle').classList.remove('active');
}
function toggleTimer() {
  if (timerSeconds <= 0 && !timerRunning) return;
  timerRunning = !timerRunning;
  const btn = document.getElementById('timerToggle');
  if (timerRunning) {
    btn.textContent = 'Pauze'; btn.classList.add('active');
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        btn.textContent = 'Start'; btn.classList.remove('active');
        showBeep();
      }
    }, 1000);
  } else {
    clearInterval(timerInterval); btn.textContent = 'Start'; btn.classList.remove('active');
  }
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  timerSeconds = timerOriginal || 0; updateTimerDisplay();
  document.getElementById('timerToggle').textContent = 'Start';
  document.getElementById('timerToggle').classList.remove('active');
}
function updateTimerDisplay() {
  const d = document.getElementById('timerDisplay');
  if (timerSeconds <= 0 && timerOriginal === 0) { d.textContent = '--:--'; d.className = 'timer-display'; return; }
  const m = Math.floor(Math.abs(timerSeconds) / 60);
  const s = Math.abs(timerSeconds) % 60;
  d.textContent = `${timerSeconds < 0 ? '-' : ''}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  d.className = 'timer-display';
  if (timerOriginal > 0) {
    const pct = timerSeconds / timerOriginal;
    if (pct <= 0) d.classList.add('danger');
    else if (pct <= 0.2) d.classList.add('warning');
  }
}
function showBeep() {
  document.getElementById('beepOverlay').classList.add('show');
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(delay => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.2);
      osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.25);
    });
  } catch(e) {}
}
function dismissBeep() { document.getElementById('beepOverlay').classList.remove('show'); }

// ===== EXPORT =====
function exportAll() {
  let o = `KOERSBEPALING MAATSCHAP — UITKOMSTEN\n${'='.repeat(50)}\nDatum: ${new Date().toLocaleDateString('nl-NL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\n\n`;
  const pIds = ['id-principle','pat-principle','zorg-principle','org-org','org-fin','org-org-l','org-fin-l','mw-wg','mw-on','kb-int','kb-ext','feedback-principle','synthese-principes'];
  const pLabels = ['Identiteit','Patiënten','Zorginhoud','Organisatie — organisatieprincipe','Organisatie — financieel principe','Organisatie (uitgebr.) — organisatieprincipe','Organisatie (uitgebr.) — financieel principe','Medewerkers — wij geven','Medewerkers — wij verwachten','Kansen — intern principe','Kansen — extern principe','Feedback','Alle principes'];
  o += `PRINCIPES\n${'-'.repeat(30)}\n`;
  pIds.forEach((id, i) => {
    const v = (state.texts || {})['principle-' + id];
    if (v) o += `\n${pLabels[i]}:\n${v}\n`;
  });
  o += `\n\nSMART-ACTIEPUNTEN\n${'-'.repeat(30)}\n`;
  for (let i = 1; i <= 8; i++) {
    const a = (state.texts || {})[`smart-actie-${i}`];
    if (a) o += `\n${i}. ${a}\n   Eigenaar: ${(state.texts||{})[`smart-eig-${i}`]||'—'}\n   Deadline: ${(state.texts||{})[`smart-dl-${i}`]||'—'}\n   Meting: ${(state.texts||{})[`smart-meet-${i}`]||'—'}\n`;
  }
  o += `\n\nEVALUATIE\n${'-'.repeat(30)}\nDatum: ${(state.texts||{})['eval-datum']||'—'}\nBewaker: ${(state.texts||{})['eval-bewaker']||'—'}\n`;
  if (Object.keys(state.votes || {}).length) {
    o += `\n\nSTEMRESULTATEN\n${'-'.repeat(30)}\n`;
    for (const [id, v] of Object.entries(state.votes)) {
      if (v.up || v.side || v.down) {
        const el = document.getElementById(`stelling-${id}`);
        const txt = el ? el.querySelector('.stelling-text')?.textContent?.trim() : id;
        o += `\n"${txt}"\n  👍 ${v.up}  🤷 ${v.side}  👎 ${v.down}\n`;
      }
    }
  }
  if (Object.keys(state.stickies || {}).length) {
    o += `\n\nSTICKY NOTES\n${'-'.repeat(30)}\n`;
    for (const [zone, stickies] of Object.entries(state.stickies)) {
      const notes = Object.values(stickies).filter(s => s.text);
      if (notes.length) {
        o += `\n[${zone}]\n`;
        notes.forEach(s => o += `  • ${s.text}\n`);
      }
    }
  }
  const pre = document.getElementById('exportOutput');
  pre.textContent = o; pre.style.display = 'block';
  navigator.clipboard?.writeText(o).then(() => {
    const btn = pre.previousElementSibling;
    const orig = btn.textContent;
    btn.textContent = '✓ Gekopieerd!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ===== KEYBOARD NAV =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
});

// ===== START =====
initFromServer().then(() => init());
</script>
